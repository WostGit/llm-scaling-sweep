name: Fully Self Contained M1 Sweep Ultra Verbose

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"

  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"

  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "Sweep mode"
        required: false
        default: "small-only"
        type: choice
        options:
          - small-only
          - robustness-only
          - full

      max_parallel:
        description: "Maximum matrix jobs to run at once"
        required: false
        default: "2"
        type: string

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-contained-sweep:
    name: Sweep - ${{ matrix.model }} - w${{ matrix.sae_width }} - s${{ matrix.seed }}
    runs-on: macos-14
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '2') }}
      matrix:
        model:
          - tiny-160m
          - mid-1.4b
        sae_width:
          - 16384
          - 65536
        seed:
          - 1
          - 2

    env:
      PYTHON_VERSION: "3.12"
      SWEEP_MODE: ${{ github.event.inputs.sweep_mode || 'small-only' }}
      SWEEP_TRACKS: "polysemanticity,circuit_faithfulness,robustness_gap"

    steps:
      - name: Show initial runner info
        run: |
          echo "=================================================="
          echo "INITIAL RUNNER INFO"
          echo "=================================================="
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run attempt: ${{ github.run_attempt }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workspace: ${{ github.workspace }}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Matrix model: ${{ matrix.model }}"
          echo "Matrix sae_width: ${{ matrix.sae_width }}"
          echo "Matrix seed: ${{ matrix.seed }}"
          echo "Sweep mode: ${{ env.SWEEP_MODE }}"
          echo "Sweep tracks: ${{ env.SWEEP_TRACKS }}"
          echo "Current directory:"
          pwd
          echo "Workspace listing:"
          ls -la "${{ github.workspace }}" || true
          echo "Kernel info:"
          uname -a
          echo "=================================================="

      - name: Set up Python without cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify Python installation
        run: |
          echo "=================================================="
          echo "VERIFY PYTHON"
          echo "=================================================="
          which python
          python --version
          python - <<'PY'
          import os
          import platform
          import sys

          print("Python executable:", sys.executable)
          print("Python version:", sys.version)
          print("Platform:", platform.platform())
          print("Machine:", platform.machine())
          print("Workspace:", os.environ.get("GITHUB_WORKSPACE"))
          PY
          echo "=================================================="

      - name: Install inline dependencies
        run: |
          echo "=================================================="
          echo "INSTALL DEPENDENCIES"
          echo "=================================================="
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy pandas matplotlib plotly
          echo "Installed dependency versions:"
          python - <<'PY'
          import numpy
          import pandas
          import matplotlib
          import plotly
          print("numpy", numpy.__version__)
          print("pandas", pandas.__version__)
          print("matplotlib", matplotlib.__version__)
          print("plotly", plotly.__version__)
          PY
          echo "=================================================="

      - name: Create deterministic artifact directory before doing anything else
        run: |
          echo "=================================================="
          echo "CREATE ARTIFACT DIRECTORY"
          echo "=================================================="
          mkdir -p "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          cat > "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}/artifact_placeholder.txt" <<'EOF'
          This placeholder file is created before the sweep runs.
          Its only job is to guarantee that the artifact directory exists
          and is never empty, even if a later step fails.
          EOF
          echo "Artifact directory created successfully."
          ls -la "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "=================================================="

      - name: Write fully self contained inline sweep script
        run: |
          echo "=================================================="
          echo "WRITE INLINE PYTHON SCRIPT"
          echo "=================================================="
          cat > "${{ github.workspace }}/sweep_inline.py" <<'PY'
          import argparse
          import json
          import math
          import random
          from pathlib import Path

          import pandas as pd
          import matplotlib.pyplot as plt
          import plotly.express as px


          def stable_noise(seed: int, scale: float = 0.02) -> float:
              rng = random.Random(seed)
              return (rng.random() - 0.5) * 2.0 * scale


          def synthetic_metrics(model: str, sae_width: int, seed: int, tracks: list[str], mode: str):
              model_size_map = {
                  "tiny-160m": 160,
                  "mid-1.4b": 1400,
              }

              size_m = model_size_map.get(model, 160)
              log_scale = math.log10(size_m)
              rows = []

              for track in tracks:
                  if mode == "robustness-only" and track != "robustness_gap":
                      continue

                  if track == "polysemanticity":
                      base = max(0.20, 0.92 - 0.14 * log_scale)
                      width_bonus = min(0.06, math.log2(sae_width / 16384 + 1) * 0.02)
                      value = max(0.0, min(1.0, base + width_bonus + stable_noise(seed + sae_width)))

                  elif track == "circuit_faithfulness":
                      base = max(0.15, 0.90 - 0.12 * log_scale)
                      value = max(0.0, min(1.0, base + stable_noise(seed * 11 + sae_width, 0.03)))

                  elif track == "robustness_gap":
                      base = min(0.95, 0.08 + 0.12 * log_scale)
                      width_penalty = min(0.08, math.log2(sae_width / 16384 + 1) * 0.015)
                      value = max(0.0, min(1.0, base + width_penalty + abs(stable_noise(seed * 7 + sae_width, 0.025))))

                  else:
                      continue

                  rows.append(
                      {
                          "model": model,
                          "model_size_m": size_m,
                          "sae_width": sae_width,
                          "seed": seed,
                          "track": track,
                          "value": round(value, 6),
                      }
                  )

              return rows


          def write_summary(df: pd.DataFrame, outdir: Path, model: str, sae_width: int, seed: int, mode: str):
              lines = [
                  "# Sweep Summary",
                  "",
                  f"- Model: `{model}`",
                  f"- SAE width: `{sae_width}`",
                  f"- Seed: `{seed}`",
                  f"- Mode: `{mode}`",
                  f"- Rows: `{len(df)}`",
                  "",
              ]

              if len(df) == 0:
                  lines.append("No rows generated.")
              else:
                  for track in sorted(df["track"].unique()):
                      sub = df[df["track"] == track]
                      mean_value = float(sub["value"].mean())
                      lines.append(f"## {track}")
                      lines.append(f"- Mean value: `{mean_value:.4f}`")
                      if track in ("polysemanticity", "circuit_faithfulness"):
                          lines.append("- Interpretation: higher is better")
                      else:
                          lines.append("- Interpretation: lower is better")
                      lines.append("")

              (outdir / "sweep_summary.md").write_text("\n".join(lines), encoding="utf-8")


          def write_plots(df: pd.DataFrame, outdir: Path):
              if len(df) == 0:
                  return

              for track in sorted(df["track"].unique()):
                  sub = df[df["track"] == track].copy()
                  plt.figure(figsize=(8, 5))
                  plt.plot(range(len(sub)), sub["value"].tolist(), marker="o")
                  plt.title(f"{track} values")
                  plt.xlabel("sample index")
                  plt.ylabel("value")
                  plt.tight_layout()
                  plt.savefig(outdir / f"{track}.png", dpi=150)
                  plt.close()

              fig = px.scatter(
                  df,
                  x="model_size_m",
                  y="value",
                  color="track",
                  hover_data=["model", "sae_width", "seed"],
                  title="Synthetic scaling sweep results",
              )
              fig.write_html(str(outdir / "results.html"))


          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument("--model", required=True)
              parser.add_argument("--sae-width", type=int, required=True)
              parser.add_argument("--seed", type=int, required=True)
              parser.add_argument("--tracks", required=True)
              parser.add_argument("--mode", required=True)
              parser.add_argument("--output-dir", required=True)
              args = parser.parse_args()

              outdir = Path(args.output_dir)
              outdir.mkdir(parents=True, exist_ok=True)

              tracks = [x.strip() for x in args.tracks.split(",") if x.strip()]
              rows = synthetic_metrics(args.model, args.sae_width, args.seed, tracks, args.mode)

              df = pd.DataFrame(rows)
              df.to_csv(outdir / "results.csv", index=False)

              if len(df) > 0:
                  agg = (
                      df.groupby(["model", "model_size_m", "sae_width", "track"], as_index=False)["value"]
                      .mean()
                      .sort_values(["model_size_m", "sae_width", "track"])
                  )
              else:
                  agg = pd.DataFrame(columns=["model", "model_size_m", "sae_width", "track", "value"])

              agg.to_csv(outdir / "results_aggregated.csv", index=False)

              write_summary(
                  df=agg,
                  outdir=outdir,
                  model=args.model,
                  sae_width=args.sae_width,
                  seed=args.seed,
                  mode=args.mode,
              )

              write_plots(df, outdir)

              payload = {
                  "model": args.model,
                  "sae_width": args.sae_width,
                  "seed": args.seed,
                  "mode": args.mode,
                  "tracks": tracks,
                  "rows": int(len(df)),
                  "output_dir": str(outdir),
              }

              (outdir / "metadata.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
              print(json.dumps(payload, indent=2))


          if __name__ == "__main__":
              main()
          PY
          echo "Inline script written."
          ls -la "${{ github.workspace }}/sweep_inline.py"
          echo "=================================================="

      - name: Run inline sweep script
        run: |
          echo "=================================================="
          echo "RUN INLINE SWEEP"
          echo "=================================================="
          python "${{ github.workspace }}/sweep_inline.py" \
            --model "${{ matrix.model }}" \
            --sae-width "${{ matrix.sae_width }}" \
            --seed "${{ matrix.seed }}" \
            --tracks "${{ env.SWEEP_TRACKS }}" \
            --mode "${{ env.SWEEP_MODE }}" \
            --output-dir "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "=================================================="

      - name: Verify outputs and repair if necessary
        if: always()
        run: |
          echo "=================================================="
          echo "VERIFY AND REPAIR OUTPUTS"
          echo "=================================================="
          TARGET="${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "Target directory: ${TARGET}"

          if [ ! -d "${TARGET}" ]; then
            echo "Target directory missing. Recreating."
            mkdir -p "${TARGET}"
          fi

          if [ ! -f "${TARGET}/artifact_placeholder.txt" ]; then
            echo "Recreating placeholder file."
            echo "placeholder recreated during verification" > "${TARGET}/artifact_placeholder.txt"
          fi

          if [ ! -f "${TARGET}/results.csv" ]; then
            echo "Creating fallback results.csv"
            echo "model,model_size_m,sae_width,seed,track,value" > "${TARGET}/results.csv"
            echo "${{ matrix.model }},0,${{ matrix.sae_width }},${{ matrix.seed }},fallback,0" >> "${TARGET}/results.csv"
          fi

          if [ ! -f "${TARGET}/results_aggregated.csv" ]; then
            echo "Creating fallback results_aggregated.csv"
            echo "model,model_size_m,sae_width,track,value" > "${TARGET}/results_aggregated.csv"
            echo "${{ matrix.model }},0,${{ matrix.sae_width }},fallback,0" >> "${TARGET}/results_aggregated.csv"
          fi

          if [ ! -f "${TARGET}/sweep_summary.md" ]; then
            echo "Creating fallback sweep_summary.md"
            cat > "${TARGET}/sweep_summary.md" <<'EOF'
          # Sweep Summary

          Fallback summary created because the primary summary file was missing.
          EOF
          fi

          if [ ! -f "${TARGET}/metadata.json" ]; then
            echo "Creating fallback metadata.json"
            cat > "${TARGET}/metadata.json" <<'EOF'
          {
            "status": "fallback-created-during-verification"
          }
          EOF
          fi

          echo "Final directory listing:"
          find "${TARGET}" -maxdepth 1 -type f | sort
          ls -la "${TARGET}"
          echo "=================================================="

      - name: Preview generated files
        if: always()
        run: |
          echo "=================================================="
          echo "PREVIEW GENERATED FILES"
          echo "=================================================="
          TARGET="${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

          echo "--- metadata.json ---"
          cat "${TARGET}/metadata.json" || true

          echo "--- results.csv ---"
          cat "${TARGET}/results.csv" || true

          echo "--- sweep_summary.md ---"
          cat "${TARGET}/sweep_summary.md" || true

          echo "=================================================="

      - name: Print final sweep result for this matrix job
        if: always()
        run: |
          echo "=================================================="
          echo "FINAL SWEEP RESULT FOR THIS MATRIX JOB"
          echo "=================================================="
          cat "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}/results.csv"
          echo "=================================================="

      - name: Upload artifact directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}-${{ github.run_id }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}
          retention-days: 30
          if-no-files-found: error

      - name: Final status message
        if: always()
        run: |
          echo "=================================================="
          echo "JOB COMPLETE"
          echo "=================================================="
          echo "Artifact directory:"
          echo "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "=================================================="

  print-all-results:
    name: Print all sweep results at end
    runs-on: macos-14
    if: always()
    needs:
      - self-contained-sweep

    steps:
      - name: Download all sweep artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/downloaded_artifacts

      - name: Print all sweep results from all matrix jobs
        run: |
          echo "=================================================="
          echo "PRINT ALL SWEEP RESULTS FROM ALL MATRIX JOBS"
          echo "=================================================="
          echo "Downloaded artifact directories:"
          find "${{ github.workspace }}/downloaded_artifacts" -maxdepth 3 | sort

          echo "=================================================="
          echo "COMBINED RESULTS"
          echo "=================================================="

          FOUND=0
          while IFS= read -r file; do
            FOUND=1
            echo ""
            echo "--------------------------------------------------"
            echo "RESULT FILE: ${file}"
            echo "--------------------------------------------------"
            cat "${file}"
          done < <(find "${{ github.workspace }}/downloaded_artifacts" -name results.csv | sort)

          if [ "${FOUND}" -eq 0 ]; then
            echo "No results.csv files were found."
            exit 1
          fi

          echo ""
          echo "=================================================="
          echo "AGGREGATED TABLE"
          echo "=================================================="

          python - <<'PY'
          import csv
          import glob
          import os

          files = sorted(glob.glob(os.path.join(os.environ["GITHUB_WORKSPACE"], "downloaded_artifacts", "**", "results.csv"), recursive=True))

          rows = []
          for file in files:
              with open(file, newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      rows.append(row)

          if not rows:
              print("No rows found in downloaded results.")
              raise SystemExit(1)

          print("model,model_size_m,sae_width,seed,track,value")
          for row in rows:
              print(
                  f'{row.get("model","")},'
                  f'{row.get("model_size_m","")},'
                  f'{row.get("sae_width","")},'
                  f'{row.get("seed","")},'
                  f'{row.get("track","")},'
                  f'{row.get("value","")}'
              )
          PY

      - name: Final combined status
        run: |
          echo "=================================================="
          echo "ALL SWEEP RESULTS PRINTED SUCCESSFULLY"
          echo "=================================================="
