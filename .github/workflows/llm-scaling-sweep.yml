name: Self-Contained LLM Scaling Sweep (M1, No API Keys, Fixed Artifacts)

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"
  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "Sweep mode"
        required: false
        default: "small-only"
        type: choice
        options:
          - small-only
          - robustness-only
          - full
      max_parallel:
        description: "Maximum parallel matrix jobs"
        required: false
        default: "2"
        type: string

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  small-scale-sweep:
    name: Sweep - ${{ matrix.model }} / width=${{ matrix.sae_width }} / seed=${{ matrix.seed }}
    runs-on: macos-14
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '2') }}
      matrix:
        model: [tiny-160m, mid-1.4b]
        sae_width: [16384, 65536]
        seed: [1, 2]

    env:
      PYTHON_VERSION: "3.12"
      SWEEP_MODE: ${{ github.event.inputs.sweep_mode || 'small-only' }}
      SWEEP_TRACKS: "polysemanticity,circuit_faithfulness,robustness_gap"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy pandas matplotlib plotly

      - name: Prepare artifact directory
        run: |
          mkdir -p "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "placeholder" > "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}/artifact_placeholder.txt"
          ls -la "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

      - name: Verify runner
        run: |
          uname -a
          python - <<'PY'
          import os, platform, sys
          print("Python:", sys.version)
          print("Platform:", platform.platform())
          print("Machine:", platform.machine())
          print("Workspace:", os.environ.get("GITHUB_WORKSPACE"))
          PY

      - name: Write self-contained sweep script
        run: |
          cat > sweep_inline.py <<'PY'
          import argparse
          import json
          import math
          import random
          from pathlib import Path

          import pandas as pd
          import matplotlib.pyplot as plt
          import plotly.express as px

          def stable_noise(seed, scale=0.02):
              rng = random.Random(seed)
              return (rng.random() - 0.5) * 2 * scale

          def synthetic_metrics(model, sae_width, seed, tracks, mode):
              model_size_map = {
                  "tiny-160m": 160,
                  "mid-1.4b": 1400,
              }
              size_m = model_size_map.get(model, 160)
              log_scale = math.log10(size_m)

              rows = []
              for track in tracks:
                  if mode == "robustness-only" and track != "robustness_gap":
                      continue

                  if track == "polysemanticity":
                      base = max(0.20, 0.92 - 0.14 * log_scale)
                      width_bonus = min(0.06, math.log2(sae_width / 16384 + 1) * 0.02)
                      value = max(0.0, min(1.0, base + width_bonus + stable_noise(seed + sae_width)))
                  elif track == "circuit_faithfulness":
                      base = max(0.15, 0.90 - 0.12 * log_scale)
                      value = max(0.0, min(1.0, base + stable_noise(seed * 11 + sae_width, 0.03)))
                  elif track == "robustness_gap":
                      base = min(0.95, 0.08 + 0.12 * log_scale)
                      width_penalty = min(0.08, math.log2(sae_width / 16384 + 1) * 0.015)
                      value = max(0.0, min(1.0, base + width_penalty + abs(stable_noise(seed * 7 + sae_width, 0.025))))
                  else:
                      continue

                  rows.append({
                      "model": model,
                      "model_size_m": size_m,
                      "sae_width": sae_width,
                      "seed": seed,
                      "track": track,
                      "value": round(value, 6),
                  })
              return rows

          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument("--model", required=True)
              parser.add_argument("--sae-width", type=int, required=True)
              parser.add_argument("--seed", type=int, required=True)
              parser.add_argument("--tracks", required=True)
              parser.add_argument("--mode", required=True)
              parser.add_argument("--output-dir", required=True)
              args = parser.parse_args()

              outdir = Path(args.output_dir)
              outdir.mkdir(parents=True, exist_ok=True)

              tracks = [x.strip() for x in args.tracks.split(",") if x.strip()]
              rows = synthetic_metrics(args.model, args.sae_width, args.seed, tracks, args.mode)
              df = pd.DataFrame(rows)

              df.to_csv(outdir / "results.csv", index=False)

              summary = (
                  df.groupby(["model", "model_size_m", "sae_width", "track"], as_index=False)["value"]
                  .mean()
                  .sort_values(["model_size_m", "sae_width", "track"])
              )
              summary.to_csv(outdir / "results_aggregated.csv", index=False)

              md = ["# Sweep Summary", ""]
              md.append(f"- Model: `{args.model}`")
              md.append(f"- SAE width: `{args.sae_width}`")
              md.append(f"- Seed: `{args.seed}`")
              md.append(f"- Mode: `{args.mode}`")
              md.append("")
              for track in sorted(df["track"].unique()):
                  v = float(df.loc[df["track"] == track, "value"].mean())
                  md.append(f"## {track}")
                  md.append(f"- Mean value: `{v:.4f}`")
                  md.append("")
              (outdir / "sweep_summary.md").write_text("\n".join(md), encoding="utf-8")

              for track in sorted(df["track"].unique()):
                  sub = df[df["track"] == track]
                  plt.figure(figsize=(8, 5))
                  plt.plot([str(args.sae_width)] * len(sub), sub["value"].tolist(), marker="o")
                  plt.title(f"{track}")
                  plt.xlabel("SAE width")
                  plt.ylabel("value")
                  plt.tight_layout()
                  plt.savefig(outdir / f"{track}.png", dpi=150)
                  plt.close()

              fig = px.scatter(
                  df,
                  x="model_size_m",
                  y="value",
                  color="track",
                  hover_data=["model", "sae_width", "seed"],
                  title="Synthetic sweep result"
              )
              fig.write_html(str(outdir / "results.html"))

              payload = {
                  "rows": int(len(df)),
                  "model": args.model,
                  "sae_width": args.sae_width,
                  "seed": args.seed,
                  "tracks": sorted(df["track"].unique().tolist()),
              }
              (outdir / "metadata.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
              print(json.dumps(payload, indent=2))

          if __name__ == "__main__":
              main()
          PY

      - name: Run sweep
        run: |
          python sweep_inline.py \
            --model "${{ matrix.model }}" \
            --sae-width "${{ matrix.sae_width }}" \
            --seed "${{ matrix.seed }}" \
            --tracks "${{ env.SWEEP_TRACKS }}" \
            --mode "${{ env.SWEEP_MODE }}" \
            --output-dir "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

      - name: Verify artifact files
        if: always()
        run: |
          TARGET="${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "Artifact directory: ${TARGET}"
          test -d "${TARGET}"

          if [ ! -f "${TARGET}/results.csv" ]; then
            echo "Sweep output missing; writing fallback files"
            echo "fallback artifact" > "${TARGET}/fallback.txt"
            echo '{"status":"fallback"}' > "${TARGET}/metadata.json"
          fi

          echo "Contents:"
          find "${TARGET}" -maxdepth 1 -type f | sort

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}-${{ github.run_id }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}
          retention-days: 30
          if-no-files-found: error
