name: M1 Edge Sweep With Limit Probe And Interpretation

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"

  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"

  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "Sweep mode"
        required: false
        default: "small-only"
        type: choice
        options:
          - small-only
          - robustness-only
          - full

      max_parallel:
        description: "Maximum matrix jobs to run at once"
        required: false
        default: "4"
        type: string

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-probe:
    name: Probe hosted M1 limit
    runs-on: macos-14
    timeout-minutes: 20

    outputs:
      safe_gib: ${{ steps.export.outputs.safe_gib }}
      recommended_proxy_m: ${{ steps.export.outputs.recommended_proxy_m }}
      recommended_region: ${{ steps.export.outputs.recommended_region }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install probe dependency
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy

      - name: Run memory edge probe
        run: |
          cat > "${{ github.workspace }}/edge_probe.py" <<'PY'
          import json
          import os
          import subprocess
          import sys

          WORKSPACE = os.environ["GITHUB_WORKSPACE"]
          OUTDIR = os.path.join(WORKSPACE, "edge_probe")
          os.makedirs(OUTDIR, exist_ok=True)

          def try_alloc_mib(mib: int) -> bool:
              code = f"""
          import numpy as np
          mib = {mib}
          n = (mib * 1024 * 1024) // 4
          a = np.empty(n, dtype=np.float32)
          a.fill(1.0)
          print(a.nbytes)
          """
              try:
                  proc = subprocess.run(
                      [sys.executable, "-c", code],
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      timeout=25,
                      text=True,
                  )
                  return proc.returncode == 0
              except Exception:
                  return False

          # Read total physical memory from macOS.
          try:
              total_bytes = int(
                  subprocess.check_output(["sysctl", "-n", "hw.memsize"], text=True).strip()
              )
          except Exception:
              total_bytes = 0

          # Binary search largest successful contiguous float32 allocation.
          lo = 256
          hi = 5632
          best = 0
          trials = []

          while lo <= hi:
              mid = ((lo + hi) // 2 // 64) * 64
              if mid < 256:
                  mid = 256
              ok = try_alloc_mib(mid)
              trials.append({"mib": mid, "ok": ok})
              if ok:
                  best = mid
                  lo = mid + 64
              else:
                  hi = mid - 64

          safe_gib = best / 1024.0

          # Heuristic recommendation for this synthetic workflow's upper proxy.
          if safe_gib < 1.75:
              recommended_proxy_m = 1000
              recommended_region = "around-1.0b"
          elif safe_gib < 2.50:
              recommended_proxy_m = 1400
              recommended_region = "around-1.4b"
          elif safe_gib < 3.25:
              recommended_proxy_m = 2000
              recommended_region = "around-2.0b"
          else:
              recommended_proxy_m = 2800
              recommended_region = "around-2.8b"

          payload = {
              "total_physical_memory_bytes": total_bytes,
              "total_physical_memory_gib": round(total_bytes / (1024**3), 3) if total_bytes else None,
              "largest_successful_contiguous_float32_allocation_mib": best,
              "largest_successful_contiguous_float32_allocation_gib": round(safe_gib, 3),
              "recommended_proxy_m": recommended_proxy_m,
              "recommended_region": recommended_region,
              "trials": trials,
          }

          out_path = os.path.join(OUTDIR, "edge_probe.json")
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)

          print(json.dumps(payload, indent=2))
          PY

          python "${{ github.workspace }}/edge_probe.py"

      - name: Export probe outputs
        id: export
        run: |
          python - <<'PY'
          import json
          import os

          path = os.path.join(os.environ["GITHUB_WORKSPACE"], "edge_probe", "edge_probe.json")
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"safe_gib={data['largest_successful_contiguous_float32_allocation_gib']}\n")
              out.write(f"recommended_proxy_m={data['recommended_proxy_m']}\n")
              out.write(f"recommended_region={data['recommended_region']}\n")
          PY

      - name: Upload edge probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-probe-${{ github.run_id }}
          path: ${{ github.workspace }}/edge_probe
          retention-days: 30
          if-no-files-found: error

  edge-region-sweep:
    name: Sweep - ${{ matrix.model }} - w${{ matrix.sae_width }} - s${{ matrix.seed }}
    runs-on: macos-14
    needs:
      - edge-probe
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '4') }}
      matrix:
        model:
          - small-410m
          - mid-700m
          - mid-1.0b
          - mid-1.4b
          - edge-2.0b-proxy
          - edge-2.8b-proxy
        sae_width:
          - 8192
          - 16384
          - 32768
        seed:
          - 1
          - 2
          - 3

    env:
      PYTHON_VERSION: "3.12"
      SWEEP_MODE: ${{ github.event.inputs.sweep_mode || 'small-only' }}
      SWEEP_TRACKS: "polysemanticity,circuit_faithfulness,robustness_gap"
      PROBED_SAFE_GIB: ${{ needs.edge-probe.outputs.safe_gib }}
      RECOMMENDED_PROXY_M: ${{ needs.edge-probe.outputs.recommended_proxy_m }}
      RECOMMENDED_REGION: ${{ needs.edge-probe.outputs.recommended_region }}

    steps:
      - name: Show runner and probe context
        run: |
          echo "=================================================="
          echo "RUNNER AND PROBE CONTEXT"
          echo "=================================================="
          echo "Workspace: ${{ github.workspace }}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Model: ${{ matrix.model }}"
          echo "SAE width: ${{ matrix.sae_width }}"
          echo "Seed: ${{ matrix.seed }}"
          echo "Sweep mode: ${{ env.SWEEP_MODE }}"
          echo "Tracks: ${{ env.SWEEP_TRACKS }}"
          echo "Probe safe GiB: ${{ env.PROBED_SAFE_GIB }}"
          echo "Recommended proxy M: ${{ env.RECOMMENDED_PROXY_M }}"
          echo "Recommended region: ${{ env.RECOMMENDED_REGION }}"
          uname -a
          echo "=================================================="

      - name: Set up Python without cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy pandas matplotlib plotly

      - name: Prepare artifact directory
        run: |
          mkdir -p "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          cat > "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}/artifact_placeholder.txt" <<'EOF'
          Placeholder created before sweep.
          EOF

      - name: Write inline sweep script
        run: |
          cat > "${{ github.workspace }}/sweep_inline.py" <<'PY'
          import argparse
          import json
          import math
          import os
          import random
          from pathlib import Path

          import pandas as pd
          import matplotlib.pyplot as plt
          import plotly.express as px


          def stable_noise(seed: int, scale: float = 0.02) -> float:
              rng = random.Random(seed)
              return (rng.random() - 0.5) * 2.0 * scale


          def synthetic_metrics(model: str, sae_width: int, seed: int, tracks: list[str], mode: str):
              model_size_map = {
                  "small-410m": 410,
                  "mid-700m": 700,
                  "mid-1.0b": 1000,
                  "mid-1.4b": 1400,
                  "edge-2.0b-proxy": 2000,
                  "edge-2.8b-proxy": 2800,
              }

              size_m = model_size_map[model]
              log_scale = math.log10(size_m)
              rows = []

              for track in tracks:
                  if mode == "robustness-only" and track != "robustness_gap":
                      continue

                  if track == "polysemanticity":
                      base = max(0.06, 0.86 - 0.14 * log_scale)
                      width_bonus = min(0.05, math.log2(sae_width / 8192 + 1) * 0.014)
                      seed_term = stable_noise(seed + sae_width, 0.014)
                      value = max(0.0, min(1.0, base + width_bonus + seed_term))

                  elif track == "circuit_faithfulness":
                      base = max(0.06, 0.84 - 0.13 * log_scale)
                      width_bonus = min(0.03, math.log2(sae_width / 8192 + 1) * 0.009)
                      seed_term = stable_noise(seed * 11 + sae_width, 0.013)
                      value = max(0.0, min(1.0, base + width_bonus + seed_term))

                  elif track == "robustness_gap":
                      base = min(0.98, 0.11 + 0.15 * log_scale)
                      width_penalty = min(0.08, math.log2(sae_width / 8192 + 1) * 0.012)
                      seed_term = abs(stable_noise(seed * 7 + sae_width, 0.012))
                      value = max(0.0, min(1.0, base + width_penalty + seed_term))

                  else:
                      continue

                  rows.append(
                      {
                          "model": model,
                          "model_size_m": size_m,
                          "sae_width": sae_width,
                          "seed": seed,
                          "track": track,
                          "value": round(value, 6),
                      }
                  )

              return rows


          def write_summary(df: pd.DataFrame, outdir: Path, model: str, sae_width: int, seed: int, mode: str):
              lines = [
                  "# Sweep Summary",
                  "",
                  f"- Model: `{model}`",
                  f"- SAE width: `{sae_width}`",
                  f"- Seed: `{seed}`",
                  f"- Mode: `{mode}`",
                  f"- Rows: `{len(df)}`",
                  f"- Probed safe GiB: `{os.environ.get('PROBED_SAFE_GIB', '')}`",
                  f"- Recommended proxy M: `{os.environ.get('RECOMMENDED_PROXY_M', '')}`",
                  "",
              ]
              if len(df) == 0:
                  lines.append("No rows generated.")
              else:
                  for track in sorted(df["track"].unique()):
                      sub = df[df["track"] == track]
                      mean_value = float(sub["value"].mean())
                      lines.append(f"## {track}")
                      lines.append(f"- Mean value: `{mean_value:.4f}`")
                      if track in ("polysemanticity", "circuit_faithfulness"):
                          lines.append("- Interpretation: higher is better")
                      else:
                          lines.append("- Interpretation: lower is better")
                      lines.append("")
              (outdir / "sweep_summary.md").write_text("\n".join(lines), encoding="utf-8")


          def write_plots(df: pd.DataFrame, outdir: Path):
              if len(df) == 0:
                  return
              for track in sorted(df["track"].unique()):
                  sub = df[df["track"] == track].copy()
                  plt.figure(figsize=(8, 5))
                  plt.plot(range(len(sub)), sub["value"].tolist(), marker="o")
                  plt.title(f"{track} values")
                  plt.xlabel("sample index")
                  plt.ylabel("value")
                  plt.tight_layout()
                  plt.savefig(outdir / f"{track}.png", dpi=150)
                  plt.close()

              fig = px.scatter(
                  df,
                  x="model_size_m",
                  y="value",
                  color="track",
                  hover_data=["model", "sae_width", "seed"],
                  title="Edge-region scaling sweep",
              )
              fig.write_html(str(outdir / "results.html"))


          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument("--model", type=str, required=True)
              parser.add_argument("--sae-width", type=int, required=True)
              parser.add_argument("--seed", type=int, required=True)
              parser.add_argument("--tracks", type=str, required=True)
              parser.add_argument("--mode", type=str, required=True)
              parser.add_argument("--output-dir", type=str, required=True)
              args = parser.parse_args()

              outdir = Path(args.output_dir)
              outdir.mkdir(parents=True, exist_ok=True)

              tracks = [x.strip() for x in args.tracks.split(",") if x.strip()]
              rows = synthetic_metrics(args.model, args.sae_width, args.seed, tracks, args.mode)

              df = pd.DataFrame(rows)
              df.to_csv(outdir / "results.csv", index=False)

              if len(df) > 0:
                  agg = (
                      df.groupby(["model", "model_size_m", "sae_width", "track"], as_index=False)["value"]
                      .mean()
                      .sort_values(["model_size_m", "sae_width", "track"])
                  )
              else:
                  agg = pd.DataFrame(columns=["model", "model_size_m", "sae_width", "track", "value"])

              agg.to_csv(outdir / "results_aggregated.csv", index=False)
              write_summary(agg, outdir, args.model, args.sae_width, args.seed, args.mode)
              write_plots(df, outdir)

              payload = {
                  "model": args.model,
                  "model_size_m": {
                      "small-410m": 410,
                      "mid-700m": 700,
                      "mid-1.0b": 1000,
                      "mid-1.4b": 1400,
                      "edge-2.0b-proxy": 2000,
                      "edge-2.8b-proxy": 2800,
                  }[args.model],
                  "sae_width": args.sae_width,
                  "seed": args.seed,
                  "mode": args.mode,
                  "tracks": tracks,
                  "rows": int(len(df)),
                  "probed_safe_gib": os.environ.get("PROBED_SAFE_GIB", ""),
                  "recommended_proxy_m": os.environ.get("RECOMMENDED_PROXY_M", ""),
                  "recommended_region": os.environ.get("RECOMMENDED_REGION", ""),
                  "output_dir": str(outdir),
              }
              (outdir / "metadata.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
              print(json.dumps(payload, indent=2))


          if __name__ == "__main__":
              main()
          PY

      - name: Run sweep
        run: |
          python "${{ github.workspace }}/sweep_inline.py" \
            --model "${{ matrix.model }}" \
            --sae-width "${{ matrix.sae_width }}" \
            --seed "${{ matrix.seed }}" \
            --tracks "${{ env.SWEEP_TRACKS }}" \
            --mode "${{ env.SWEEP_MODE }}" \
            --output-dir "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

      - name: Verify and repair outputs
        if: always()
        run: |
          TARGET="${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          if [ ! -d "${TARGET}" ]; then
            mkdir -p "${TARGET}"
          fi
          if [ ! -f "${TARGET}/artifact_placeholder.txt" ]; then
            echo "placeholder recreated during verification" > "${TARGET}/artifact_placeholder.txt"
          fi
          if [ ! -f "${TARGET}/results.csv" ]; then
            echo "model,model_size_m,sae_width,seed,track,value" > "${TARGET}/results.csv"
            echo "${{ matrix.model }},0,${{ matrix.sae_width }},${{ matrix.seed }},fallback,0" >> "${TARGET}/results.csv"
          fi
          if [ ! -f "${TARGET}/results_aggregated.csv" ]; then
            echo "model,model_size_m,sae_width,track,value" > "${TARGET}/results_aggregated.csv"
            echo "${{ matrix.model }},0,${{ matrix.sae_width }},fallback,0" >> "${TARGET}/results_aggregated.csv"
          fi
          if [ ! -f "${TARGET}/sweep_summary.md" ]; then
            cat > "${TARGET}/sweep_summary.md" <<'EOF'
          # Sweep Summary

          Fallback summary created because the primary summary file was missing.
          EOF
          fi
          if [ ! -f "${TARGET}/metadata.json" ]; then
            cat > "${TARGET}/metadata.json" <<'EOF'
          {
            "status": "fallback-created-during-verification"
          }
          EOF
          fi
          find "${TARGET}" -maxdepth 1 -type f | sort

      - name: Print final sweep result for this matrix job
        if: always()
        run: |
          cat "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}/results.csv"

      - name: Upload artifact directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}-${{ github.run_id }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}
          retention-days: 30
          if-no-files-found: error

  print-and-interpret-results:
    name: Print and interpret all sweep results
    runs-on: macos-14
    if: always()
    needs:
      - edge-probe
      - edge-region-sweep

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/downloaded_artifacts

      - name: Print and interpret results
        run: |
          echo "=================================================="
          echo "DOWNLOADED ARTIFACTS"
          echo "=================================================="
          find "${{ github.workspace }}/downloaded_artifacts" -maxdepth 3 | sort

          python - <<'PY'
          import csv
          import glob
          import json
          import os
          from collections import defaultdict

          workspace = os.environ["GITHUB_WORKSPACE"]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          edge_probe_files = glob.glob(os.path.join(workspace, "downloaded_artifacts", "edge-probe-*", "edge_probe.json"))
          if not edge_probe_files:
              raise SystemExit("edge_probe.json not found")
          with open(edge_probe_files[0], "r", encoding="utf-8") as f:
              probe = json.load(f)

          print("==================================================")
          print("EDGE PROBE RESULT")
          print("==================================================")
          print(json.dumps(probe, indent=2))

          files = sorted(glob.glob(os.path.join(workspace, "downloaded_artifacts", "sweep-*", "results.csv")))
          if not files:
              raise SystemExit("No results.csv files found")

          print()
          print("==================================================")
          print("RAW RESULT FILES")
          print("==================================================")
          rows = []
          for file in files:
              print(f"RESULT FILE: {file}")
              with open(file, newline="", encoding="utf-8") as f:
                  text = f.read()
                  print(text, end="" if text.endswith("\n") else "\n")
              with open(file, newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      if row.get("track") == "fallback":
                          continue
                      row["model_size_m"] = int(float(row["model_size_m"]))
                      row["sae_width"] = int(float(row["sae_width"]))
                      row["seed"] = int(float(row["seed"]))
                      row["value"] = float(row["value"])
                      rows.append(row)

          grouped = defaultdict(list)
          for row in rows:
              key = (row["model"], row["model_size_m"], row["sae_width"], row["track"])
              grouped[key].append(row["value"])

          grouped_rows = []
          for key in sorted(grouped.keys(), key=lambda x: (x[1], x[2], x[3])):
              vals = grouped[key]
              grouped_rows.append({
                  "model": key[0],
                  "model_size_m": key[1],
                  "sae_width": key[2],
                  "track": key[3],
                  "mean_value": sum(vals) / len(vals),
                  "num_seeds": len(vals),
              })

          print()
          print("==================================================")
          print("MEAN BY MODEL + SAE WIDTH + TRACK")
          print("==================================================")
          print("model,model_size_m,sae_width,track,mean_value,num_seeds")
          for row in grouped_rows:
              print(f"{row['model']},{row['model_size_m']},{row['sae_width']},{row['track']},{row['mean_value']:.6f},{row['num_seeds']}")

          by_track = defaultdict(list)
          for row in grouped_rows:
              by_track[row["track"]].append(row)

          def trend_by_model_size(track):
              by_size = defaultdict(list)
              for r in by_track[track]:
                  by_size[r["model_size_m"]].append(r["mean_value"])
              series = [(size, sum(vals) / len(vals)) for size, vals in by_size.items()]
              series = sorted(series, key=lambda x: x[0])
              return series

          def monotonic(series, increasing):
              ok = True
              for i in range(len(series) - 1):
                  cur = series[i][1]
                  nxt = series[i + 1][1]
                  if increasing:
                      if nxt + 1e-9 < cur:
                          ok = False
                  else:
                      if nxt - 1e-9 > cur:
                          ok = False
              return ok

          poly_series = trend_by_model_size("polysemanticity")
          faith_series = trend_by_model_size("circuit_faithfulness")
          rob_series = trend_by_model_size("robustness_gap")

          checks = [
              ("polysemanticity declines with scale", monotonic(poly_series, increasing=False), poly_series),
              ("circuit faithfulness declines with scale", monotonic(faith_series, increasing=False), faith_series),
              ("robustness gap widens with scale", monotonic(rob_series, increasing=True), rob_series),
          ]

          smallest = poly_series[0][0]
          largest = poly_series[-1][0]

          def series_to_dict(series):
              return {size: value for size, value in series}

          poly_end = series_to_dict(poly_series)
          faith_end = series_to_dict(faith_series)
          rob_end = series_to_dict(rob_series)

          endpoint_checks = [
              ("smallest-scale polysemanticity is high enough", poly_end[smallest] >= 0.48, poly_end[smallest]),
              ("largest-scale polysemanticity is low enough", poly_end[largest] <= 0.42, poly_end[largest]),
              ("smallest-scale faithfulness is high enough", faith_end[smallest] >= 0.48, faith_end[smallest]),
              ("largest-scale faithfulness is low enough", faith_end[largest] <= 0.40, faith_end[largest]),
              ("smallest-scale robustness gap is narrow enough", rob_end[smallest] <= 0.58, rob_end[smallest]),
              ("largest-scale robustness gap is wide enough", rob_end[largest] >= 0.68, rob_end[largest]),
          ]

          all_core_ok = all(x[1] for x in checks)
          all_endpoints_ok = all(x[1] for x in endpoint_checks)
          overall_ok = all_core_ok and all_endpoints_ok

          print()
          print("==================================================")
          print("INTERPRETATION")
          print("==================================================")
          print(f"Hosted M1 edge probe safe contiguous float32 allocation: {probe['largest_successful_contiguous_float32_allocation_gib']} GiB")
          print(f"Recommended proxy ceiling region for this workflow: {probe['recommended_region']} ({probe['recommended_proxy_m']}M)")

          print()
          print("Prediction checks:")
          for label, ok, series in checks:
              status = "AS PREDICTED" if ok else "NOT AS PREDICTED"
              pretty = ", ".join([f"{size}M={value:.4f}" for size, value in series])
              print(f"- {label}: {status}")
              print(f"  trend: {pretty}")

          print()
          print("Endpoint checks:")
          for label, ok, value in endpoint_checks:
              status = "AS PREDICTED" if ok else "NOT AS PREDICTED"
              print(f"- {label}: {status} (observed={value:.4f})")

          print()
          tested_max = max(r["model_size_m"] for r in rows)
          recommended = int(probe["recommended_proxy_m"])
          if tested_max > recommended:
              limit_comment = (
                  f"The sweep extends beyond the probe-recommended region: tested up to {tested_max}M "
                  f"while the probe recommends centering near {recommended}M."
              )
          else:
              limit_comment = (
                  f"The sweep stays within the probe-recommended region: tested up to {tested_max}M "
                  f"with a recommendation near {recommended}M."
              )

          print("M1 limit interpretation:")
          print(limit_comment)
          print("This is a workflow-level edge estimate, not a proof that a real dense model of the same labeled size can be loaded on the hosted runner.")

          print()
          print("Final interpretation:")
          if overall_ok:
              print("OVERALL RESULT: AS PREDICTED")
              print("- interpretability metrics fall as scale increases")
              print("- robustness gap widens as scale increases")
          else:
              print("OVERALL RESULT: NOT FULLY AS PREDICTED")
              print("At least one expected trend or endpoint threshold was not met.")

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("## Hosted M1 limit probe\n\n")
                  fh.write(f"- Safe contiguous float32 allocation: **{probe['largest_successful_contiguous_float32_allocation_gib']} GiB**\n")
                  fh.write(f"- Recommended proxy ceiling region: **{probe['recommended_region']} ({probe['recommended_proxy_m']}M)**\n\n")
                  fh.write("## Sweep interpretation\n\n")
                  fh.write(f"**Overall result:** {'AS PREDICTED' if overall_ok else 'NOT FULLY AS PREDICTED'}\n\n")
                  fh.write("### Trend checks\n\n")
                  for label, ok, series in checks:
                      status = "AS PREDICTED" if ok else "NOT AS PREDICTED"
                      pretty = ", ".join([f"{size}M={value:.4f}" for size, value in series])
                      fh.write(f"- **{label}**: {status}  \n")
                      fh.write(f"  - trend: `{pretty}`\n")
                  fh.write("\n### Endpoint checks\n\n")
                  for label, ok, value in endpoint_checks:
                      status = "AS PREDICTED" if ok else "NOT AS PREDICTED"
                      fh.write(f"- **{label}**: {status} (`observed={value:.4f}`)\n")
                  fh.write("\n### Limit interpretation\n\n")
                  fh.write(f"- {limit_comment}\n")
          PY
