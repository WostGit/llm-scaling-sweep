name: Self-Contained LLM Scaling Sweep - M1 - Ultra Verbose - Reliability First

# ============================================================
# TRIGGERS
# ============================================================
# This workflow runs:
# 1. On push to main/master when this workflow file changes
# 2. On pull requests to main/master when this workflow file changes
# 3. Manually via workflow_dispatch
#
# The narrow path filter is intentional:
# - it keeps this workflow self-contained
# - it prevents accidental runs from unrelated repo changes
# ============================================================
on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"

  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/llm-scaling-sweep.yml"

  workflow_dispatch:
    inputs:
      sweep_mode:
        description: "Sweep mode to run"
        required: false
        default: "small-only"
        type: choice
        options:
          - small-only
          - robustness-only
          - full

      max_parallel:
        description: "Maximum number of matrix jobs to run in parallel"
        required: false
        default: "2"
        type: string

# ============================================================
# PERMISSIONS
# ============================================================
# Minimal permissions for safety and predictability.
# ============================================================
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read

# ============================================================
# CONCURRENCY
# ============================================================
# Prevent overlapping runs for the same branch/ref.
# If you push multiple times quickly, older in-progress runs
# are cancelled.
# ============================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOBS
# ============================================================
jobs:
  small-scale-sweep:
    name: Sweep - ${{ matrix.model }} - width=${{ matrix.sae_width }} - seed=${{ matrix.seed }}

    # --------------------------------------------------------
    # RUNNER
    # --------------------------------------------------------
    # macos-14 is the GitHub-hosted Apple Silicon runner target
    # you asked for.
    # --------------------------------------------------------
    runs-on: macos-14

    # --------------------------------------------------------
    # TIMEOUT
    # --------------------------------------------------------
    # Keep a hard upper bound so hung jobs do not burn minutes.
    # --------------------------------------------------------
    timeout-minutes: 45

    # --------------------------------------------------------
    # MATRIX
    # --------------------------------------------------------
    # Small, reliable matrix for hosted M1 execution.
    # You can expand later after it is stable.
    # --------------------------------------------------------
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '2') }}
      matrix:
        model:
          - tiny-160m
          - mid-1.4b
        sae_width:
          - 16384
          - 65536
        seed:
          - 1
          - 2

    # --------------------------------------------------------
    # STATIC ENVIRONMENT
    # --------------------------------------------------------
    # These are safe to keep at job scope because they are not
    # used as fragile path transport between steps.
    # --------------------------------------------------------
    env:
      PYTHON_VERSION: "3.12"
      SWEEP_MODE: ${{ github.event.inputs.sweep_mode || 'small-only' }}
      SWEEP_TRACKS: "polysemanticity,circuit_faithfulness,robustness_gap"

    steps:
      # ======================================================
      # STEP 1: CHECKOUT
      # ======================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ======================================================
      # STEP 2: SET UP PYTHON
      # ======================================================
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ======================================================
      # STEP 3: SHOW CORE RUNNER INFO
      # ======================================================
      # This is intentionally verbose for debugging.
      # It helps confirm:
      # - platform
      # - architecture
      # - workspace
      # - matrix values
      # - mode selection
      # ======================================================
      - name: Print runner and job context
        run: |
          echo "=================================================="
          echo "RUNNER / JOB CONTEXT"
          echo "=================================================="
          echo "Workflow name: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run attempt: ${{ github.run_attempt }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workspace: ${{ github.workspace }}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Current directory:"
          pwd
          echo "Directory contents:"
          ls -la
          echo "Selected matrix model: ${{ matrix.model }}"
          echo "Selected matrix sae_width: ${{ matrix.sae_width }}"
          echo "Selected matrix seed: ${{ matrix.seed }}"
          echo "Selected sweep mode: ${{ env.SWEEP_MODE }}"
          echo "Selected sweep tracks: ${{ env.SWEEP_TRACKS }}"
          echo "=================================================="
          echo "Kernel / machine info:"
          uname -a
          echo "=================================================="

      # ======================================================
      # STEP 4: INSTALL PYTHON DEPENDENCIES
      # ======================================================
      # Keep dependencies minimal and explicit.
      # No external model downloads. No auth required.
      # ======================================================
      - name: Install Python dependencies
        run: |
          echo "=================================================="
          echo "INSTALLING PYTHON DEPENDENCIES"
          echo "=================================================="
          python -m pip install --upgrade pip setuptools wheel
          pip --version
          python --version
          pip install numpy pandas matplotlib plotly
          echo "=================================================="
          echo "INSTALLED PACKAGES"
          echo "=================================================="
          pip list | grep -E 'numpy|pandas|matplotlib|plotly' || true
          echo "=================================================="

      # ======================================================
      # STEP 5: PREPARE OUTPUT DIRECTORY
      # ======================================================
      # This is one of the most important reliability steps.
      #
      # We do NOT depend on environment propagation for this path.
      # We write directly to a literal absolute path under
      # github.workspace.
      #
      # We also create a placeholder file immediately so that
      # upload-artifact always has something to find, even if
      # the sweep fails later.
      # ======================================================
      - name: Prepare deterministic artifact directory
        run: |
          echo "=================================================="
          echo "PREPARING ARTIFACT DIRECTORY"
          echo "=================================================="

          mkdir -p "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

          echo "This file is created before the sweep starts so the artifact directory is never empty." \
            > "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}/artifact_placeholder.txt"

          echo "Artifact directory prepared:"
          echo "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "Contents:"
          ls -la "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "=================================================="

      # ======================================================
      # STEP 6: WRITE SELF-CONTAINED PYTHON SCRIPT
      # ======================================================
      # This script:
      # - creates synthetic benchmark data
      # - writes CSV output
      # - writes aggregated CSV
      # - writes markdown summary
      # - writes PNG plots
      # - writes HTML plot
      # - writes metadata JSON
      #
      # It has no external API dependencies and no need for
      # repo-side Python files.
      # ======================================================
      - name: Write inline sweep script
        run: |
          echo "=================================================="
          echo "WRITING INLINE PYTHON SWEEP SCRIPT"
          echo "=================================================="

          cat > sweep_inline.py <<'PY'
          import argparse
          import json
          import math
          import random
          from pathlib import Path

          import pandas as pd
          import matplotlib.pyplot as plt
          import plotly.express as px


          def stable_noise(seed: int, scale: float = 0.02) -> float:
              rng = random.Random(seed)
              return (rng.random() - 0.5) * 2.0 * scale


          def synthetic_metrics(model: str, sae_width: int, seed: int, tracks: list[str], mode: str):
              model_size_map = {
                  "tiny-160m": 160,
                  "mid-1.4b": 1400,
              }

              size_m = model_size_map.get(model, 160)
              log_scale = math.log10(size_m)
              rows = []

              for track in tracks:
                  if mode == "robustness-only" and track != "robustness_gap":
                      continue

                  if track == "polysemanticity":
                      base = max(0.20, 0.92 - 0.14 * log_scale)
                      width_bonus = min(0.06, math.log2(sae_width / 16384 + 1) * 0.02)
                      value = max(0.0, min(1.0, base + width_bonus + stable_noise(seed + sae_width)))

                  elif track == "circuit_faithfulness":
                      base = max(0.15, 0.90 - 0.12 * log_scale)
                      value = max(0.0, min(1.0, base + stable_noise(seed * 11 + sae_width, 0.03)))

                  elif track == "robustness_gap":
                      base = min(0.95, 0.08 + 0.12 * log_scale)
                      width_penalty = min(0.08, math.log2(sae_width / 16384 + 1) * 0.015)
                      value = max(0.0, min(1.0, base + width_penalty + abs(stable_noise(seed * 7 + sae_width, 0.025))))

                  else:
                      continue

                  rows.append(
                      {
                          "model": model,
                          "model_size_m": size_m,
                          "sae_width": sae_width,
                          "seed": seed,
                          "track": track,
                          "value": round(value, 6),
                      }
                  )

              return rows


          def write_summary(df: pd.DataFrame, outdir: Path, model: str, sae_width: int, seed: int, mode: str):
              summary_lines = []
              summary_lines.append("# Sweep Summary")
              summary_lines.append("")
              summary_lines.append(f"- Model: `{model}`")
              summary_lines.append(f"- SAE width: `{sae_width}`")
              summary_lines.append(f"- Seed: `{seed}`")
              summary_lines.append(f"- Mode: `{mode}`")
              summary_lines.append(f"- Row count: `{len(df)}`")
              summary_lines.append("")

              if len(df) == 0:
                  summary_lines.append("No rows were generated.")
              else:
                  for track in sorted(df["track"].unique()):
                      track_mean = float(df.loc[df["track"] == track, "value"].mean())
                      summary_lines.append(f"## {track}")
                      summary_lines.append(f"- Mean value: `{track_mean:.4f}`")
                      if track in ("polysemanticity", "circuit_faithfulness"):
                          summary_lines.append("- Interpretation: higher is better")
                      else:
                          summary_lines.append("- Interpretation: lower is better")
                      summary_lines.append("")

              (outdir / "sweep_summary.md").write_text("\n".join(summary_lines), encoding="utf-8")


          def write_plots(df: pd.DataFrame, outdir: Path):
              if len(df) == 0:
                  return

              for track in sorted(df["track"].unique()):
                  sub = df[df["track"] == track].copy()

                  plt.figure(figsize=(8, 5))
                  plt.plot(range(len(sub)), sub["value"].tolist(), marker="o")
                  plt.title(f"{track} values")
                  plt.xlabel("sample index")
                  plt.ylabel("value")
                  plt.tight_layout()
                  plt.savefig(outdir / f"{track}.png", dpi=150)
                  plt.close()

              fig = px.scatter(
                  df,
                  x="model_size_m",
                  y="value",
                  color="track",
                  hover_data=["model", "sae_width", "seed"],
                  title="Synthetic scaling sweep results",
              )
              fig.write_html(str(outdir / "results.html"))


          def main():
              parser = argparse.ArgumentParser(description="Self-contained synthetic sweep")
              parser.add_argument("--model", required=True)
              parser.add_argument("--sae-width", required=True, type=int)
              parser.add_argument("--seed", required=True, type=int)
              parser.add_argument("--tracks", required=True)
              parser.add_argument("--mode", required=True)
              parser.add_argument("--output-dir", required=True)
              args = parser.parse_args()

              outdir = Path(args.output_dir)
              outdir.mkdir(parents=True, exist_ok=True)

              tracks = [x.strip() for x in args.tracks.split(",") if x.strip()]
              rows = synthetic_metrics(args.model, args.sae_width, args.seed, tracks, args.mode)

              df = pd.DataFrame(rows)
              df.to_csv(outdir / "results.csv", index=False)

              if len(df) > 0:
                  agg = (
                      df.groupby(["model", "model_size_m", "sae_width", "track"], as_index=False)["value"]
                      .mean()
                      .sort_values(["model_size_m", "sae_width", "track"])
                  )
              else:
                  agg = pd.DataFrame(columns=["model", "model_size_m", "sae_width", "track", "value"])

              agg.to_csv(outdir / "results_aggregated.csv", index=False)

              write_summary(
                  df=agg,
                  outdir=outdir,
                  model=args.model,
                  sae_width=args.sae_width,
                  seed=args.seed,
                  mode=args.mode,
              )

              write_plots(df, outdir)

              payload = {
                  "model": args.model,
                  "sae_width": args.sae_width,
                  "seed": args.seed,
                  "mode": args.mode,
                  "tracks": tracks,
                  "rows": int(len(df)),
                  "files_expected": [
                      "artifact_placeholder.txt",
                      "results.csv",
                      "results_aggregated.csv",
                      "sweep_summary.md",
                      "metadata.json",
                      "results.html",
                  ],
              }

              (outdir / "metadata.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")

              print("Synthetic sweep completed successfully.")
              print(json.dumps(payload, indent=2))


          if __name__ == "__main__":
              main()
          PY

          echo "Inline script written."
          ls -la sweep_inline.py
          echo "=================================================="

      # ======================================================
      # STEP 7: RUN THE SWEEP
      # ======================================================
      # Uses a fully explicit output path.
      # No fragile variable indirection.
      # ======================================================
      - name: Run synthetic sweep
        run: |
          echo "=================================================="
          echo "RUNNING SYNTHETIC SWEEP"
          echo "=================================================="

          python sweep_inline.py \
            --model "${{ matrix.model }}" \
            --sae-width "${{ matrix.sae_width }}" \
            --seed "${{ matrix.seed }}" \
            --tracks "${{ env.SWEEP_TRACKS }}" \
            --mode "${{ env.SWEEP_MODE }}" \
            --output-dir "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

          echo "=================================================="
          echo "SWEEP FINISHED"
          echo "=================================================="

      # ======================================================
      # STEP 8: VERIFY OUTPUTS
      # ======================================================
      # This is the second most important reliability step.
      #
      # If the sweep failed early or did not create expected files,
      # this step creates fallback files so artifact upload still
      # succeeds and preserves debugging information.
      # ======================================================
      - name: Verify and repair artifact directory if needed
        if: always()
        run: |
          echo "=================================================="
          echo "VERIFYING ARTIFACT OUTPUTS"
          echo "=================================================="

          TARGET="${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

          echo "Target artifact directory:"
          echo "${TARGET}"

          if [ ! -d "${TARGET}" ]; then
            echo "Artifact directory missing. Recreating it now."
            mkdir -p "${TARGET}"
          fi

          if [ ! -f "${TARGET}/artifact_placeholder.txt" ]; then
            echo "Recreating placeholder file."
            echo "placeholder recreated during verification" > "${TARGET}/artifact_placeholder.txt"
          fi

          if [ ! -f "${TARGET}/results.csv" ]; then
            echo "results.csv missing. Creating fallback files."
            echo "fallback artifact because primary sweep output was missing" > "${TARGET}/fallback.txt"
            echo '{"status":"fallback-created-during-verification"}' > "${TARGET}/metadata.json"
            echo "note,reason" > "${TARGET}/results.csv"
            echo "fallback,primary output missing" >> "${TARGET}/results.csv"
          fi

          if [ ! -f "${TARGET}/results_aggregated.csv" ]; then
            echo "track,value" > "${TARGET}/results_aggregated.csv"
            echo "fallback,0" >> "${TARGET}/results_aggregated.csv"
          fi

          if [ ! -f "${TARGET}/sweep_summary.md" ]; then
            cat > "${TARGET}/sweep_summary.md" <<'EOF'
          # Sweep Summary

          Fallback summary created because the primary summary file was missing.
          EOF
          fi

          echo "Final artifact directory contents:"
          find "${TARGET}" -maxdepth 1 -type f | sort

          echo "Long listing:"
          ls -la "${TARGET}"

          echo "=================================================="

      # ======================================================
      # STEP 9: PRINT FILE CONTENT PREVIEW
      # ======================================================
      # Helpful when debugging uploads.
      # ======================================================
      - name: Preview generated files
        if: always()
        run: |
          echo "=================================================="
          echo "PREVIEWING GENERATED FILES"
          echo "=================================================="

          TARGET="${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"

          echo "--- metadata.json ---"
          if [ -f "${TARGET}/metadata.json" ]; then
            cat "${TARGET}/metadata.json"
          else
            echo "metadata.json missing"
          fi

          echo "--- results.csv ---"
          if [ -f "${TARGET}/results.csv" ]; then
            head -n 20 "${TARGET}/results.csv"
          else
            echo "results.csv missing"
          fi

          echo "--- sweep_summary.md ---"
          if [ -f "${TARGET}/sweep_summary.md" ]; then
            cat "${TARGET}/sweep_summary.md"
          else
            echo "sweep_summary.md missing"
          fi

          echo "=================================================="

      # ======================================================
      # STEP 10: UPLOAD ARTIFACTS
      # ======================================================
      # Upload a single deterministic directory path rooted under
      # github.workspace.
      #
      # This is the safest pattern and avoids the issues you hit
      # with empty shell variables.
      # ======================================================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}-${{ github.run_id }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}
          retention-days: 30
          if-no-files-found: error

      # ======================================================
      # STEP 11: FINAL SUCCESS LOG
      # ======================================================
      - name: Final status message
        if: always()
        run: |
          echo "=================================================="
          echo "JOB COMPLETE"
          echo "=================================================="
          echo "Model: ${{ matrix.model }}"
          echo "SAE width: ${{ matrix.sae_width }}"
          echo "Seed: ${{ matrix.seed }}"
          echo "Artifacts directory:"
          echo "${{ github.workspace }}/artifacts/${{ matrix.model }}-w${{ matrix.sae_width }}-s${{ matrix.seed }}"
          echo "=================================================="
